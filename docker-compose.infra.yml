services:
  postgres:
    image: postgres:15
    container_name: spotifyclone-postgres
    environment:
      POSTGRES_DB: spotifyclone_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: spotifyclone-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
  
  redis:
    image: redis:alpine
    container_name: spotifyclone-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    restart: always
    volumes:
      - redis_data:/data

volumes:
  audio_data:
  temp_data:
  postgres_data:
  minio_data:
  redis_data:
